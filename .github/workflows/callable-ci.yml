name: 'Callable CI'

on:
  workflow_call:
    inputs:
      run_lint:
        description: 'Run lint checks'
        type: boolean
        required: true
      run_build:
        description: 'Run build'
        type: boolean
        required: true
      run_e2e:
        description: 'Run E2E tests'
        type: boolean
        required: false
        default: false

jobs:
  lint:
    if: inputs.run_lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install

      - name: Run lint
        run: pnpm run lint

  build:
    if: inputs.run_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build package
        run: pnpm run build

  e2e:
    if: inputs.run_e2e
    runs-on: ubuntu-latest
    env:
      SPREADSHEET_ID_E2E: ${{ secrets.SPREADSHEET_ID_E2E }}
      ACCOUNT_EMAIL_E2E: ${{ secrets.ACCOUNT_EMAIL_E2E }}
      OAUTH_CLIENT_ID_E2E: ${{ secrets.OAUTH_CLIENT_ID_E2E }}
      OAUTH_CLIENT_SECRET_E2E: ${{ secrets.OAUTH_CLIENT_SECRET_E2E }}
      OAUTH_REFRESH_TOKEN_E2E: ${{ secrets.OAUTH_REFRESH_TOKEN_E2E }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install

      - name: Run E2E tests
        run: pnpm run test:e2e
